<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HATORI Group · Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
.login-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  background: 
    url('https://hijau.b-cdn.net/213q13rt43.png') center center / cover no-repeat,
    #0a0a15;
}

.login-bg-blur {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(1px);
  -webkit-backdrop-filter: blur(2px);
  z-index: 0;
  background: rgba(10, 10, 21, 0.5);
}
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      z-index: 0;
      animation: floatOrb 20s ease-in-out infinite alternate;
    }
    .orb--1 { width: 400px; height: 400px; background: rgba(59, 130, 246, 0.3); top: -100px; left: -100px; animation-delay: 0s; }
    .orb--2 { width: 350px; height: 350px; background: rgba(139, 92, 246, 0.25); bottom: -80px; right: -80px; animation-delay: 5s; }
    .orb--3 { width: 250px; height: 250px; background: rgba(236, 72, 153, 0.2); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 10s; }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(10px, -10px) scale(1.05); }
    }
    .auth-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .auth-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.5s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo .logo-icon {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      text-decoration: none;
    }
    .auth-logo .logo-icon i { color: #3b82f6; font-size: 32px; }
    .auth-logo .logo-icon span { color: #3b82f6; }
    .auth-title {
      text-align: center;
      margin-bottom: 8px;
    }
    .auth-title h2 {
      color: #ffffff;
      font-size: 28px;
      font-weight: 700;
    }
    .auth-title p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      margin-top: 4px;
    }
    .auth-form {
      margin-top: 24px;
    }
    .auth-form .form-group {
      margin-bottom: 18px;
    }
    .auth-form .form-group label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 6px;
    }
    .auth-form .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      background: rgba(255, 255, 255, 0.04);
      color: #ffffff;
      transition: all 0.3s ease;
    }
    .auth-form .form-group input:focus {
      outline: none;
      border-color: rgba(59, 130, 246, 0.4);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
    }
    .auth-form .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }
    .auth-forgot {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 20px;
    }
    .auth-forgot a {
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
      text-decoration: none;
      transition: 0.3s;
    }
    .auth-forgot a:hover { color: #93c5fd; }
    .btn-auth {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-auth-primary {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #ffffff;
    }
    .btn-auth-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(59, 130, 246, 0.3);
    }
    .btn-auth-primary:active { transform: translateY(0); }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
    }
    .auth-divider span {
      color: rgba(255, 255, 255, 0.3);
      font-size: 13px;
    }
    .auth-social {
      display: flex;
      gap: 12px;
    }
    .auth-social button {
      flex: 1;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .auth-social button:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.15);
      color: #ffffff;
    }
    .auth-social button i { font-size: 18px; }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
    .auth-footer p {
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
    }
    .auth-footer a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }
    .auth-footer a:hover { color: #93c5fd; }
    .auth-alert {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .auth-alert.error {
      display: block;
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.2);
      color: #f87171;
    }
    .auth-alert.success {
      display: block;
      background: rgba(22, 163, 74, 0.15);
      border: 1px solid rgba(22, 163, 74, 0.2);
      color: #4ade80;
    }
    .auth-alert.warning {
      display: block;
      background: rgba(234, 179, 8, 0.15);
      border: 1px solid rgba(234, 179, 8, 0.2);
      color: #facc15;
    }
    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px; }
      .auth-social { flex-direction: column; }
      .auth-title h2 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="login-bg"></div>
  <div class="login-bg-blur"></div>
  <div class="orb orb--1"></div>
  <div class="orb orb--2"></div>
  <div class="orb orb--3"></div>

  <div class="auth-container" id="loginContainer">
    <div class="auth-card">
<div class="logo-area" style="justify-content: center; padding-left: 0;">
  <img src="https://hijau.b-cdn.net/png-hatorigrup.png" alt="Hatori Group" style="height: 40px; width: auto; display: block; margin: 0 auto;">
  <div>

  </div>
</div>

      <div class="auth-title">
        <h2>Hello!</h2>
        <p>Welcome Back</p>
      </div>

      <div id="loginAlert" class="auth-alert"></div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label>Enter Email</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>
        <div class="auth-forgot">
          <a href="#" id="forgotPassword">Forgot Password?</a>
        </div>
        <button type="submit" class="btn-auth btn-auth-primary">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <div class="auth-divider">
        <span>Or continue with</span>
      </div>

      <div class="auth-social">
        <button><i class="fab fa-google"></i> Google</button>
        <button><i class="fab fa-facebook-f"></i> Facebook</button>
      </div>

      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Create Account!</a></p>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {

      function initializeUsers() {
        let users = JSON.parse(localStorage.getItem('hrpro_users'));
        
        if (!users || users.length === 0) {
          users = [
            {
              id: 1,
              name: 'Super Admin',
              email: 'superadmin@hrpro.com',
              password: 'admin123',
              role: 'Superadmin',
              situs: 'HATORI Group Indonesia',
              status: 'Active',
              createdDate: '2026-07-01'
            },
            {
              id: 2,
              name: 'Admin User',
              email: 'admin@hrpro.com',
              password: 'admin123',
              role: 'Admin',
              situs: 'HATORI Group Indonesia',
              status: 'Active',
              createdDate: '2026-07-05'
            },
            {
              id: 3,
              name: 'Regular User',
              email: 'user@hrpro.com',
              password: 'user123',
              role: 'User',
              situs: 'WDBOS',
              status: 'Inactive',
              createdDate: '2026-07-10'
            }
          ];
          localStorage.setItem('hrpro_users', JSON.stringify(users));
        }
        
        const hasSuperadmin = users.some(u => u.email === 'superadmin@hrpro.com');
        if (!hasSuperadmin) {
          users.push({
            id: users.length + 1,
            name: 'Super Admin',
            email: 'superadmin@hrpro.com',
            password: 'admin123',
            role: 'Superadmin',
            situs: 'HATORI Group Indonesia',
            status: 'Active',
            createdDate: '2026-07-01'
          });
          localStorage.setItem('hrpro_users', JSON.stringify(users));
        }
        
        users = users.map(u => {
          if (u.email === 'superadmin@hrpro.com') {
            return { ...u, status: 'Active' };
          }
          return u;
        });
        localStorage.setItem('hrpro_users', JSON.stringify(users));
        
        return users;
      }

      function getUsers() {
        return JSON.parse(localStorage.getItem('hrpro_users')) || [];
      }

      function showAlert(containerId, message, type = 'error') {
        const alert = document.getElementById(containerId);
        if (!alert) return;
        alert.textContent = message;
        alert.className = 'auth-alert ' + type;
        alert.style.display = 'block';
        setTimeout(() => {
          alert.style.display = 'none';
        }, 5000);
      }

      const savedUser = localStorage.getItem('hrpro_current_user');
      if (savedUser) {
        try {
          const user = JSON.parse(savedUser);
          const usersData = getUsers();
          const existing = usersData.find(u => u.email === user.email);
          if (existing && (existing.role === 'Superadmin' || existing.status === 'Active')) {
            window.location.href = 'index.html';
            return;
          } else {
            localStorage.removeItem('hrpro_current_user');
          }
        } catch(e) {
          localStorage.removeItem('hrpro_current_user');
        }
      }

      initializeUsers();

      const loginForm = document.getElementById('loginForm');
      if (loginForm) {
        loginForm.addEventListener('submit', function(e) {
          e.preventDefault();
          
          const email = document.getElementById('loginEmail').value.trim();
          const password = document.getElementById('loginPassword').value.trim();
          
          if (!email || !password) {
            showAlert('loginAlert', '⚠️ Harap isi semua field!', 'error');
            return;
          }
          
          const users = getUsers();
          const user = users.find(u => u.email === email && u.password === password);
          
          if (!user) {
            showAlert('loginAlert', '❌ Email atau password salah!', 'error');
            return;
          }
          
          if (user.role === 'Superadmin') {
            localStorage.setItem('hrpro_current_user', JSON.stringify(user));
            localStorage.setItem('hrpro_last_page', 'dashboard');
            showAlert('loginAlert', '✅ Login Superadmin berhasil!', 'success');
            setTimeout(function() {
              window.location.href = 'index.html';
            }, 1500);
            return;
          }
          
          if (user.status !== 'Active') {
            showAlert('loginAlert', '⚠️ Akun Anda belum diaktifkan oleh Superadmin. Silakan tunggu aktivasi.', 'warning');
            return;
          }
          
          localStorage.setItem('hrpro_current_user', JSON.stringify(user));
          localStorage.setItem('hrpro_last_page', 'dashboard');
          showAlert('loginAlert', '✅ Login berhasil!', 'success');
          
          setTimeout(function() {
            window.location.href = 'index.html';
          }, 1500);
        });
      }
    });
  </script>
</body>
</html>
