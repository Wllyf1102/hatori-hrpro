<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HATORI Group · Register</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
.login-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  background: 
    url('https://hijau.b-cdn.net/213q13rt43.png') center center / cover no-repeat,
    #0a0a15;
}

.login-bg-blur {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(1px);
  -webkit-backdrop-filter: blur(2px);
  z-index: 0;
  background: rgba(10, 10, 21, 0.5);
}
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      z-index: 0;
      animation: floatOrb 20s ease-in-out infinite alternate;
    }
    .orb--1 { width: 400px; height: 400px; background: rgba(59, 130, 246, 0.3); top: -100px; left: -100px; animation-delay: 0s; }
    .orb--2 { width: 350px; height: 350px; background: rgba(139, 92, 246, 0.25); bottom: -80px; right: -80px; animation-delay: 5s; }
    .orb--3 { width: 250px; height: 250px; background: rgba(236, 72, 153, 0.2); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 10s; }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(10px, -10px) scale(1.05); }
    }
    .auth-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .auth-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.5s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    /* Logo Area - Sama seperti Login */
    .logo-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 32px;
      padding-left: 0;
      width: 100%;
    }
    .logo-area i {
      display: none !important;
    }
    .logo-area span {
      display: none !important;
    }
    .logo-area img {
      display: block !important;
      height: 40px;
      width: auto;
      max-width: 180px;
      object-fit: contain;
      margin: 0 auto;
    }
    .auth-title {
      text-align: center;
      margin-bottom: 8px;
    }
    .auth-title h2 {
      color: #ffffff;
      font-size: 28px;
      font-weight: 700;
    }
    .auth-title p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      margin-top: 4px;
    }
    .auth-form {
      margin-top: 24px;
    }
    .auth-form .form-group {
      margin-bottom: 18px;
    }
    .auth-form .form-group label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 6px;
    }
    .auth-form .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      background: rgba(255, 255, 255, 0.04);
      color: #ffffff;
      transition: all 0.3s ease;
    }
    .auth-form .form-group input:focus {
      outline: none;
      border-color: rgba(59, 130, 246, 0.4);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
    }
    .auth-form .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }
    .btn-auth {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-auth-primary {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #ffffff;
    }
    .btn-auth-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(59, 130, 246, 0.3);
    }
    .btn-auth-primary:active { transform: translateY(0); }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
    }
    .auth-divider span {
      color: rgba(255, 255, 255, 0.3);
      font-size: 13px;
    }
    .auth-social {
      display: flex;
      gap: 12px;
    }
    .auth-social button {
      flex: 1;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .auth-social button:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.15);
      color: #ffffff;
    }
    .auth-social button i { font-size: 18px; }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
    .auth-footer p {
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
    }
    .auth-footer a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }
    .auth-footer a:hover { color: #93c5fd; }
    .auth-alert {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .auth-alert.error {
      display: block;
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.2);
      color: #f87171;
    }
    .auth-alert.success {
      display: block;
      background: rgba(22, 163, 74, 0.15);
      border: 1px solid rgba(22, 163, 74, 0.2);
      color: #4ade80;
    }
    .auth-alert.warning {
      display: block;
      background: rgba(234, 179, 8, 0.15);
      border: 1px solid rgba(234, 179, 8, 0.2);
      color: #facc15;
    }
    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px; }
      .auth-social { flex-direction: column; }
      .auth-title h2 { font-size: 24px; }
      .logo-area img { height: 32px; }
    }
  </style>
</head>
<body>
  <div class="login-bg"></div>
  <div class="login-bg-blur"></div>
  <div class="orb orb--1"></div>
  <div class="orb orb--2"></div>
  <div class="orb orb--3"></div>

  <div class="auth-container" id="registerContainer">
    <div class="auth-card">
      <!-- Logo Area - Sama seperti Login -->
      <div class="logo-area" style="justify-content: center; padding-left: 0;">
        <img src="https://hijau.b-cdn.net/png-hatorigrup.png" alt="Hatori Group" style="height: 40px; width: auto; display: block; margin: 0 auto;">
      </div>

      <div class="auth-title">
        <h2>Create Account</h2>
        <p>Join us today</p>
      </div>

      <div id="registerAlert" class="auth-alert"></div>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="registerName" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="registerEmail" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="registerPassword" placeholder="Minimal 6 characters" minlength="6" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="registerConfirmPassword" placeholder="Confirm your password" required>
        </div>
        <button type="submit" class="btn-auth btn-auth-primary">
          <i class="fas fa-user-plus"></i> Register
        </button>
      </form>

      <div class="auth-divider">
        <span>Or continue with</span>
      </div>

      <div class="auth-social">
        <button><i class="fab fa-google"></i> Google</button>
        <button><i class="fab fa-facebook-f"></i> Facebook</button>
      </div>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Sign In</a></p>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {

      function getUsers() {
        return JSON.parse(localStorage.getItem('hrpro_users')) || [];
      }

      function saveUsers(users) {
        localStorage.setItem('hrpro_users', JSON.stringify(users));
      }

      function showAlert(containerId, message, type = 'error') {
        const alert = document.getElementById(containerId);
        if (!alert) return;
        alert.textContent = message;
        alert.className = 'auth-alert ' + type;
        alert.style.display = 'block';
        setTimeout(() => {
          alert.style.display = 'none';
        }, 5000);
      }

      function getTodayDate() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      }

      // ========== CHECK LOGIN STATUS ==========
      const savedUser = localStorage.getItem('hrpro_current_user');
      if (savedUser) {
        try {
          const user = JSON.parse(savedUser);
          const usersData = getUsers();
          const existing = usersData.find(u => u.email === user.email);
          if (existing && (existing.role === 'Superadmin' || existing.status === 'Active')) {
            window.location.href = 'index.html';
            return;
          } else {
            localStorage.removeItem('hrpro_current_user');
          }
        } catch(e) {
          localStorage.removeItem('hrpro_current_user');
        }
      }

      const registerForm = document.getElementById('registerForm');
      if (registerForm) {
        registerForm.addEventListener('submit', function(e) {
          e.preventDefault();
          
          const name = document.getElementById('registerName').value.trim();
          const email = document.getElementById('registerEmail').value.trim();
          const password = document.getElementById('registerPassword').value;
          const confirmPassword = document.getElementById('registerConfirmPassword').value;
          
          if (!name || !email || !password || !confirmPassword) {
            showAlert('registerAlert', '⚠️ Harap isi semua field!', 'error');
            return;
          }
          
          if (password.length < 6) {
            showAlert('registerAlert', '⚠️ Password minimal 6 karakter!', 'error');
            return;
          }
          
          if (password !== confirmPassword) {
            showAlert('registerAlert', '⚠️ Password tidak cocok!', 'error');
            return;
          }
          
          const users = getUsers();
          
          const existing = users.find(u => u.email === email);
          if (existing) {
            showAlert('registerAlert', '❌ Email sudah terdaftar!', 'error');
            return;
          }
          
          // Cegah registrasi dengan email superadmin
          if (email.toLowerCase() === 'superadmin@hrpro.com') {
            showAlert('registerAlert', '❌ Email ini tidak dapat didaftarkan!', 'error');
            return;
          }
          
          const newUser = {
            id: users.length + 1,
            name: name,
            email: email,
            password: password,
            role: 'User',
            situs: 'HATORI Group Indonesia',
            status: 'Inactive',
            createdDate: getTodayDate()
          };
          
          users.push(newUser);
          saveUsers(users);
          
          showAlert('registerAlert', 
            '✅ Pendaftaran berhasil! Akun Anda akan diaktifkan oleh Superadmin. Silakan login setelah aktivasi.', 
            'success'
          );
          
          registerForm.reset();
          
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 3000);
        });
      }
    });
  </script>
</body>
</html>
